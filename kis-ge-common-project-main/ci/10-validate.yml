# Stage: validate / plan — MR 단계
# fmt → init → validate → tflint → tfsec.
validate:
  stage: validate
  before_script:
    - |
      NEED=""
      for t in curl bash unzip; do
        command -v "$t" >/dev/null 2>&1 || NEED="$NEED $t"
      done
      if [ -n "$NEED" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache $NEED
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y --no-install-recommends $NEED ca-certificates
        elif command -v yum >/dev/null 2>&1; then
          yum install -y $NEED
        fi
      fi
    - curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
  script:
    - terraform fmt -check -recursive $TF_ROOT
    - cd $TF_ROOT
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"
    - terraform validate
    - tflint --init
    - tflint --recursive
    - cd "$CI_PROJECT_DIR"
    - tfsec $TF_ROOT --minimum-severity HIGH
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

plan:
  stage: plan
  extends: .tf_template
  script:
    - terraform plan -input=false -out=tfplan.binary
  artifacts:
    paths:
      - $TF_ROOT/tfplan.binary
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
