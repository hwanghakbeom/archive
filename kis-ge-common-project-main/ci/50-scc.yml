# Stage: scc — 04.scc/* (tier 게이트 + notifications + on-prem forwarder)
.main_rules: &main_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

# SCC Premium/Enterprise tier 활성화 확인 게이트 (안내만).
enable-scc-tier:
  stage: scc
  script:
    - |
      cat <<'MSG'
      ==> SCC Premium/Enterprise tier 활성화 확인 단계
      수동 작업:
        1. GCP Console - Security - Security Command Center - Settings
        2. Tier - Activate Premium 또는 Activate Enterprise
        3. Billing 연결 및 비용 승인
      활성화 후 terraform.tfvars의 enable_phase6=true 로 변경 → push.
      필요 권한: roles/securitycenter.admin (org) + roles/billing.user
      MSG
  when: manual
  rules: *main_rules

# SCC notification config + PubSub topic (Premium tier 전제).
apply-scc-notifications:
  stage: scc
  extends: .tf_template
  variables:
    TF_TARGET: module.scc_notifications
  script: !reference [.tf_apply, script]
  when: manual
  rules: *main_rules

# SCC On-prem Forwarder — VPC/NAT/고정IP/AR repo/Cloud Run Job/Scheduler/Secret.
# refresh 활성화 필요(computed service.uri) → tf_apply(-refresh=false) 대신 인라인.
apply-scc-onprem-forwarder:
  stage: scc
  extends: .tf_template
  variables:
    TF_TARGET: module.scc_onprem_forwarder
  script:
    - |
      set -e
      echo "▸ TF_TARGET=$TF_TARGET  DRY_RUN=$DRY_RUN"
      terraform plan -input=false -target="$TF_TARGET" -out=tfplan.binary
      if [ "$DRY_RUN" = "false" ]; then
        echo "▸ DRY_RUN=false — apply 실행"
        terraform apply -input=false -auto-approve tfplan.binary
        echo "================ Deployed Outputs ================"
        terraform output -no-color scc_forwarder_egress_ip         || true
        terraform output -no-color scc_forwarder_artifact_registry || true
        terraform output -no-color scc_forwarder_service_url       || true
        terraform output -no-color scc_forwarder_subscription_name || true
        terraform output -no-color scc_forwarder_service_account   || true
        echo "=================================================="
      else
        echo "▸ DRY_RUN=true(기본) — plan만. 적용하려면 DRY_RUN=false."
      fi
  when: manual
  rules: *main_rules

# SCC forwarder end-to-end 스모크 테스트 (수동, 비-terraform).
test-scc-forwarder:
  stage: scc
  variables:
    TEST_PROJECT: "kis-gemini-common-prod"
    TEST_TOPIC: "scc-findings-notifications"
    TEST_SERVICE: "scc-tcp-forwarder"
  script:
    - |
      set -e
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
      MARKER="ci-test-$(date +%s)"
      echo "▸ 테스트 finding publish (marker=${MARKER})"
      gcloud pubsub topics publish "${TEST_TOPIC}" --project="${TEST_PROJECT}" \
        --message="{\"finding\":{\"category\":\"TCP_FORWARDER_TEST\",\"severity\":\"HIGH\",\"state\":\"ACTIVE\",\"marker\":\"${MARKER}\"},\"resource\":{\"name\":\"//ci-smoke-test\"}}"
      echo "▸ Cloud Run 처리/전송 대기 (최대 60s)"
      RESULT=""
      for i in $(seq 1 12); do
        sleep 5
        LOGS=$(gcloud logging read \
          "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"${TEST_SERVICE}\"" \
          --project="${TEST_PROJECT}" --freshness=3m --limit=30 \
          --format="value(textPayload, jsonPayload.msg)" 2>/dev/null || true)
        if echo "$LOGS" | grep -q "forwarded"; then RESULT="SUCCESS"; break; fi
        if echo "$LOGS" | grep -qiE "TCP timeout|TCP send failed|tcp failed"; then RESULT="TCP_FAIL"; break; fi
        echo "  ...대기중 (${i}/12)"
      done
      echo "================ 최근 forwarder 로그 ================"
      gcloud logging read \
        "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"${TEST_SERVICE}\"" \
        --project="${TEST_PROJECT}" --freshness=5m --limit=10 \
        --format="value(timestamp, jsonPayload.msg, textPayload)" 2>/dev/null || true
      echo "===================================================="
      case "$RESULT" in
        SUCCESS)  echo "✅ PASS: on-prem(219.255.63.27:1514)까지 TCP 전송 완료";;
        TCP_FAIL) echo "⚠️ PARTIAL: forwarder 정상. on-prem 방화벽(35.216.58.131→1514)/포트 점검"; exit 1;;
        *)        echo "❓ INCONCLUSIVE: 60s 내 전송 로그 미확인. 구독/권한/콜드스타트 점검"; exit 1;;
      esac
      rm -f /tmp/sa.json; rm -rf /tmp/google-cloud-sdk /tmp/gcloud.tar.gz
  when: manual
  rules: *main_rules

# forwarder 컨테이너 이미지 빌드(Cloud Build) + AR push (비-terraform).
build-forwarder-image:
  stage: scc
  variables:
    IMAGE_TAG: "v1"
    BUILD_PROJECT: "kis-gemini-common-prod"
    BUILD_REGION: "asia-northeast3"
  script:
    - |
      set -e
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
      BUILD_SA="$(gcloud config get-value account 2>/dev/null)"
      echo "▸ build service account: ${BUILD_SA}"
      cd iac/04.scc/onprem-forwarder/forwarder/
      echo "▸ Cloud Build 시작: project=${BUILD_PROJECT} region=${BUILD_REGION} tag=${IMAGE_TAG}"
      gcloud builds submit \
        --config=cloudbuild.yaml \
        --project="${BUILD_PROJECT}" \
        --service-account="projects/${BUILD_PROJECT}/serviceAccounts/${BUILD_SA}" \
        --substitutions=_REGION="${BUILD_REGION}",_TAG="${IMAGE_TAG}",_PROJECT_ID="${BUILD_PROJECT}" \
        .
      IMAGE_URI="${BUILD_REGION}-docker.pkg.dev/${BUILD_PROJECT}/scc-forwarder/forwarder:${IMAGE_TAG}"
      echo "================================================================"
      echo "✅ 이미지 빌드 + AR push 완료. tfvars의 scc_forwarder_image_uri 로 복사:"
      echo "  scc_forwarder_image_uri = \"${IMAGE_URI}\""
      echo "그 다음 apply-scc-onprem-forwarder(DRY_RUN=false) 재실행 → Cloud Run revision 갱신."
      echo "================================================================"
      rm -f /tmp/sa.json; rm -rf /tmp/google-cloud-sdk /tmp/gcloud.tar.gz
  when: manual
  rules: *main_rules

# 배포된 forwarder 운영 정보 출력 (output-only, apply 없음).
apply-scc-forwarder-info:
  stage: scc
  extends: .tf_template
  script:
    - echo "================ SCC TCP Forwarder 배포 상태 ================"
    - terraform output scc_forwarder_egress_ip          || echo "(egress_ip output 없음 — enable=true + apply 선행 필요)"
    - terraform output scc_forwarder_artifact_registry  || true
    - terraform output scc_forwarder_service_name       || true
    - terraform output scc_forwarder_service_url        || true
    - terraform output scc_forwarder_subscription_name  || true
    - terraform output scc_forwarder_service_account    || true
  when: manual
  rules: *main_rules
