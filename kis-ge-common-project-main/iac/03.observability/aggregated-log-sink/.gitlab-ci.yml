# CI: 03.observability/aggregated-log-sink (모듈 디렉토리 내 정의)
.main_rules: &main_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

apply-aggregated-sink:
  stage: observability
  extends: .tf_template
  variables:
    DRY_RUN: "true"   # 기본 dry-run(plan). 이 줄 주석처리(또는 "false")하면 apply
    TF_TARGET: module.aggregated_log_sink
  script: !reference [.tf_apply, script]
  when: manual
  rules: *main_rules

# google_organization_iam_audit_config (DATA_READ/WRITE 강제, 비용 영향).
