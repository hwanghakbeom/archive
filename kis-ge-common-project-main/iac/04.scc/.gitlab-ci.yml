# CI: 04.scc (모듈 디렉토리 내 정의)
.main_rules: &main_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

enable-scc-tier:
  stage: scc
  script:
    - |
      cat <<'MSG'
      ==> SCC Premium/Enterprise tier 활성화 확인 단계
      수동 작업:
        1. GCP Console - Security - Security Command Center - Settings
        2. Tier - Activate Premium 또는 Activate Enterprise
        3. Billing 연결 및 비용 승인
      활성화 후 terraform.tfvars의 enable_phase6=true 로 변경 → push.
      필요 권한: roles/securitycenter.admin (org) + roles/billing.user
      MSG
  when: manual
  rules: *main_rules

# SCC notification config + PubSub topic (Premium tier 전제).
