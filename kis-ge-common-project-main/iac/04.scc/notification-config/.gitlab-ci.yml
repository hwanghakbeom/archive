# CI: 04.scc/notification-config (모듈 디렉토리 내 정의)
# SCC findings → PubSub notification config. 단순 리소스 → plan/apply 분리(saved plan).
.scc_notif_rules: &scc_notif_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

plan-scc-notifications:
  extends: .tf_plan
  stage: scc
  variables:
    TF_TARGET: module.scc_notifications
  rules: *scc_notif_rules

apply-scc-notifications:
  extends: .tf_apply_saved
  stage: scc
  needs:
    - plan-scc-notifications
  rules: *scc_notif_rules

# SCC On-prem Forwarder — onprem-forwarder/.gitlab-ci.yml 참조.
# Cloud Run computed uri 때문에 plan/apply 분리 대신 통합 apply(REFRESH) 유지.
