# CI: 04.scc/notification-config (모듈 디렉토리 내 정의)
.main_rules: &main_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

apply-scc-notifications:
  stage: scc
  extends: .tf_template
  variables:
    DRY_RUN: "true"   # 기본 plan/skip. 적용 시 false
    TF_TARGET: module.scc_notifications
  script: !reference [.tf_apply, script]
  when: manual
  rules: *main_rules

# SCC On-prem Forwarder — VPC/NAT/고정IP/AR repo/Cloud Run Job/Scheduler/Secret.
# refresh 활성화 필요(computed service.uri) → tf_apply(-refresh=false) 대신 인라인.
