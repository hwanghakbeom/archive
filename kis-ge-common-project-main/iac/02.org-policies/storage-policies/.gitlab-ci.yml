# CI: 02.org-policies/storage-policies (모듈 디렉토리 내 정의)
.main_rules: &main_rules
  - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  - if: '$CI_PIPELINE_SOURCE == "web"'

apply-storage-policies:
  stage: org-policies
  extends: .tf_template
  variables:
    DRY_RUN: "true"   # 기본 dry-run(plan). 이 줄 주석처리(또는 "false")하면 apply
    TF_TARGET: module.storage_policies
  script: !reference [.tf_apply, script]
  when: manual
  rules: *main_rules

# gcp.restrictNonCmekServices (기본 비활성 toggle).
