    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Stage: scc (04.scc/*)
# ============================================================

# SCC Premium/Enterprise tier 활성화 확인 게이트 (수동).
enable-scc-tier:
  stage: scc
  # alpine:3(Docker Hub) override 제거 — runner가 Docker Hub 차단됨.
  # default ECR 이미지 상속 (echo만 하므로 아무 이미지나 OK).
  script:
    - |
      cat <<'MSG'
      ==> SCC Premium/Enterprise tier 활성화 확인 단계

      수동 작업:
        1. GCP Console - Security - Security Command Center - Settings
        2. Tier - Activate Premium 또는 Activate Enterprise 클릭
        3. Billing account 연결 및 비용 승인
        4. (선택) ETD / Attack Path / Mandiant 설정 확인

      활성화 완료 후 terraform.tfvars 에서 enable_phase6 = true 로 변경 후
      main 에 push, 이 job 통과시키면 apply-scc-notifications 진행 가능.

      필요 권한: roles/securitycenter.admin (org) + roles/billing.user
      MSG
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# SCC notification config + PubSub topic (Premium tier 전제).
apply-scc-notifications:
  stage: scc
  <<: *tf_template
  variables:
    TF_TARGET: module.scc_notifications
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# SCC On-prem Forwarder — VPC/NAT/고정 IP/AR repo/Cloud Run Job/Scheduler/Secret.
# 사전 조건:
#   1. apply-services 1회 실행 (run/cloudscheduler/artifactregistry/compute/secretmanager API enable)
#   2. terraform.tfvars 에서 enable_scc_onprem_forwarder = true 로 변경 후 push
# 활성화 후:
#   - apply-scc-forwarder-info job 으로 고정 IP 확인 → on-prem 방화벽 화이트리스트
#   - iac/04.scc/onprem-forwarder/forwarder/ 에서 이미지 빌드 + AR push
#   - scc_forwarder_image_uri 변경 + 재apply
apply-scc-onprem-forwarder:
  stage: scc
  <<: *tf_template
  variables:
    TF_TARGET: module.scc_onprem_forwarder
  script:
    # refresh 활성화: service.uri 등 computed 값을 live에서 읽어야 subscription의
    # push_endpoint가 올바른 값으로 plan됨 (-refresh=false면 stale ""로 고정되어
    # "inconsistent final plan" / push_endpoint invalid 발생).
    - terraform plan -input=false -target=$TF_TARGET -out=tfplan.binary
    - terraform apply -input=false -auto-approve tfplan.binary
    # apply 완료 직후 운영 정보 노출 — on-prem 방화벽 화이트리스트 등록용.
    - echo "================ Deployed Outputs ================"
    - terraform output -no-color scc_forwarder_egress_ip         || true
    - terraform output -no-color scc_forwarder_artifact_registry || true
    - terraform output -no-color scc_forwarder_service_url       || true
    - terraform output -no-color scc_forwarder_subscription_name || true
    - terraform output -no-color scc_forwarder_service_account   || true
    - echo "=================================================="
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ───────────────────────────────────────────────────────────────────
# SCC forwarder end-to-end 스모크 테스트 (수동).
# 테스트 finding을 topic에 publish → subscription push → Cloud Run →
# on-prem TCP 전송 시도. Cloud Run 로그에서 결과 자동 판정.
#
# 전제: apply-scc-notifications + apply-scc-onprem-forwarder 완료(서비스 Ready).
# 권한: IaC SA에 roles/pubsub.publisher(topic) + roles/logging.viewer.
#
# 판정:
#   "forwarded ... to 219.255.63.27:1514" → ✅ on-prem까지 도달
#   "TCP timeout/failed"                   → ⚠️ forwarder 정상, on-prem 방화벽/포트 점검
#                                              (35.216.58.131 → 1514 화이트리스트 확인)
test-scc-forwarder:
  stage: scc
  variables:
    TEST_PROJECT: "kis-gemini-common-prod"
    TEST_TOPIC: "scc-findings-notifications"
    TEST_SERVICE: "scc-tcp-forwarder"
  script:
    - |
      set -e
      # gcloud 설치 (ECR 이미지 미포함) — build-forwarder-image와 동일 패턴
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json

      MARKER="ci-test-$(date +%s)"
      echo "▸ 테스트 finding publish (marker=${MARKER})"
      gcloud pubsub topics publish "${TEST_TOPIC}" --project="${TEST_PROJECT}" \
        --message="{\"finding\":{\"category\":\"TCP_FORWARDER_TEST\",\"severity\":\"HIGH\",\"state\":\"ACTIVE\",\"marker\":\"${MARKER}\"},\"resource\":{\"name\":\"//ci-smoke-test\"}}"

      echo "▸ Cloud Run 처리/전송 대기 + 로그 확인 (최대 60s, min_instance=0 콜드스타트 포함)"
      RESULT=""
      for i in $(seq 1 12); do
        sleep 5
        LOGS=$(gcloud logging read \
          "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"${TEST_SERVICE}\"" \
          --project="${TEST_PROJECT}" --freshness=3m --limit=30 \
          --format="value(textPayload, jsonPayload.msg)" 2>/dev/null || true)
        if echo "$LOGS" | grep -q "forwarded"; then RESULT="SUCCESS"; break; fi
        if echo "$LOGS" | grep -qiE "TCP timeout|TCP send failed|tcp failed"; then RESULT="TCP_FAIL"; break; fi
        echo "  ...대기중 (${i}/12)"
      done

      echo "================ 최근 forwarder 로그 ================"
      gcloud logging read \
        "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"${TEST_SERVICE}\"" \
        --project="${TEST_PROJECT}" --freshness=5m --limit=10 \
        --format="value(timestamp, jsonPayload.msg, textPayload)" 2>/dev/null || true
      echo "===================================================="
      case "$RESULT" in
        SUCCESS)  echo "✅ PASS: on-prem(219.255.63.27:1514)까지 TCP 전송 완료";;
        TCP_FAIL) echo "⚠️ PARTIAL: forwarder는 정상 수신/전송 시도. on-prem 방화벽(35.216.58.131→1514)/포트 점검 필요"; exit 1;;
        *)        echo "❓ INCONCLUSIVE: 60s 내 전송 로그 미확인. 구독/권한/콜드스타트 점검"; exit 1;;
      esac

      rm -f /tmp/sa.json; rm -rf /tmp/google-cloud-sdk /tmp/gcloud.tar.gz
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# forwarder 컨테이너 이미지를 Cloud Build로 빌드 + AR push.
# 로컬 docker 불필요 — Cloud Build가 GCP 쪽에서 처리. CI는 wrapper 역할.
#
# 사전 조건 (IaC SA = kis-gemini-common-prod-iac@... 가 빌드 실행 SA):
#   - cloudbuild.googleapis.com API enable (apply-services에 포함됨)
#   - roles/cloudbuild.builds.editor
#   - roles/storage.admin (또는 objectViewer) — Cloud Build staging 버킷 소스 read
#   - roles/artifactregistry.writer — 이미지 push
#   - roles/logging.logWriter — CLOUD_LOGGING_ONLY 빌드 로그
#   - roles/iam.serviceAccountUser ON 자기 자신 — --service-account actAs (필수!)
#   - apply-scc-onprem-forwarder가 한 번 돌아서 AR repo 존재해야 함
#
# Run Pipeline 변수:
#   IMAGE_TAG  : 빌드 태그 (예: v1, v2, $(date +%Y%m%d)). 기본 v1.
#
# 빌드 후 출력된 URI를 terraform.tfvars의 scc_forwarder_image_uri로 복사 → 재apply하면
# Cloud Run Service revision이 새 이미지로 갱신됨.
build-forwarder-image:
  stage: scc
  variables:
    IMAGE_TAG: "v1"
    BUILD_PROJECT: "kis-gemini-common-prod"
    BUILD_REGION: "asia-northeast3"
  script:
    - |
      set -e
      # gcloud 설치 (ECR 이미지에 미포함) — unlock-state 패턴 재사용
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
      BUILD_SA="$(gcloud config get-value account 2>/dev/null)"
      echo "▸ build service account: ${BUILD_SA}"

      # Cloud Build 트리거 (forwarder/ 디렉터리의 cloudbuild.yaml 사용)
      cd iac/04.scc/onprem-forwarder/forwarder/
      echo "▸ Cloud Build 시작: project=${BUILD_PROJECT} region=${BUILD_REGION} tag=${IMAGE_TAG}"
      # --service-account: 기본 빌드 SA(compute/cloudbuild)는 org 정책
      #   (disable_automatic_iam_grants_default_sa)으로 권한이 0 → 스테이징 소스
      #   읽기 403(storage.objects.get). 권한 있는 IaC SA로 빌드 실행.
      #   (cloudbuild.yaml의 logging=CLOUD_LOGGING_ONLY 필요 — 이미 설정됨)
      gcloud builds submit \
        --config=cloudbuild.yaml \
        --project="${BUILD_PROJECT}" \
        --service-account="projects/${BUILD_PROJECT}/serviceAccounts/${BUILD_SA}" \
        --substitutions=_REGION="${BUILD_REGION}",_TAG="${IMAGE_TAG}",_PROJECT_ID="${BUILD_PROJECT}" \
        .

      IMAGE_URI="${BUILD_REGION}-docker.pkg.dev/${BUILD_PROJECT}/scc-forwarder/forwarder:${IMAGE_TAG}"
      echo ""
      echo "================================================================"
      echo "✅ 이미지 빌드 + AR push 완료"
      echo ""
      echo "다음 줄을 terraform.tfvars 의 scc_forwarder_image_uri 로 복사:"
      echo "  scc_forwarder_image_uri = \"${IMAGE_URI}\""
      echo ""
      echo "그 다음 apply-scc-onprem-forwarder 재실행 → Cloud Run Service revision 갱신."
      echo "================================================================"

      # 정리
      rm -f /tmp/sa.json
      rm -rf /tmp/google-cloud-sdk /tmp/gcloud.tar.gz
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# 배포된 forwarder의 운영 정보 출력 (고정 IP / AR repo / SA / 시크릿 ID).
# on-prem 방화벽 화이트리스트 등록 + 이미지 push 명령 헬퍼 확인용.
apply-scc-forwarder-info:
  stage: scc
  <<: *tf_template
  script:
    - echo "================ SCC TCP Forwarder 배포 상태 ================"
    - terraform output scc_forwarder_egress_ip          || echo "(egress_ip output 없음 — enable=true + apply 선행 필요)"
    - terraform output scc_forwarder_artifact_registry  || true
    - terraform output scc_forwarder_service_name       || true
    - terraform output scc_forwarder_service_url        || true
    - terraform output scc_forwarder_subscription_name  || true
    - terraform output scc_forwarder_service_account    || true
    - echo ""
    - echo "================ 운영 명령 헬퍼 ================"
    - 'echo "[1] 이미지 빌드 + AR push:"'
    - 'echo "    cd iac/04.scc/onprem-forwarder/forwarder/"'
    - 'echo "    gcloud builds submit --config=cloudbuild.yaml \\"'
    - 'echo "      --project=kis-gemini-common-prod \\"'
    - 'echo "      --substitutions=_REGION=asia-northeast3,_TAG=v2 ."'
    - 'echo ""'
    - 'echo "[2] Cloud Run Service 로그 (실시간 finding 전송 확인):"'
    - 'echo "    gcloud logging tail \\"'
    - 'echo "      ''resource.type=\"cloud_run_revision\" resource.labels.service_name=\"scc-tcp-forwarder\"'' \\"'
    - 'echo "      --project=kis-gemini-common-prod"'
    - 'echo ""'
    - 'echo "[3] PubSub 강제 테스트 메시지 (TCP 동작 확인용):"'
    - 'echo "    gcloud pubsub topics publish scc-findings-notifications \\"'
    - 'echo "      --message=''{\"finding\":{\"category\":\"TEST\",\"severity\":\"HIGH\"}}'' \\"'
    - 'echo "      --project=kis-gemini-common-prod"'
    - 'echo ""'
    - 'echo "[4] Subscription 일시 정지 / 재개:"'
    - 'echo "    gcloud pubsub subscriptions update scc-findings-tcp-forwarder \\"'
    - 'echo "      --push-endpoint='''' --project=kis-gemini-common-prod   # pause"'
    - 'echo "    (재개는 terraform apply로 push_endpoint 복원)"'
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Stage: verify — 전체 plan no-op
# ============================================================
apply-verify:
  stage: verify
  <<: *tf_template
  script:
    - terraform plan -input=false
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
