# 루트 파이프라인 — 공통 설정 + 모듈별 CI 파일 include.
# 모듈별 job 정의는 ci/*.yml 로 분리. (YAML 앵커는 include 간 공유 불가 →
# 공통 템플릿은 hidden job(.tf_template/.tf_apply) + extends/!reference 로 제공.)
stages:
  - bootstrap      # 1회성: state bucket 생성 + SA 검증
  - validate
  - plan
  - vpc-sc          # 01.access-context-manager/* — Access Policy
  - org-policies    # 02.org-policies/*           — storage / cmek / location / service / iam / domain
  - observability   # 03.observability/*          — aggregated-log-sink + org-audit-config + ge-log-analytics
  - scc             # 04.scc/*                    — SCC tier 게이트 + notification config + forwarder
  - verify          # 전체 plan no-op

variables:
  TF_VERSION: "1.14.6"
  TF_ROOT: iac
  TF_STATE_BUCKET: kis-gemini-common-prod-tfstate
  TF_STATE_PREFIX: lzone/org
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # checkpoint-api.hashicorp.com 호출 차단 — allowlist 외이고 기능적으로 불필요
  CHECKPOINT_DISABLE: "1"
  # provider plugin 캐시 — job마다 google provider(~150MB) 재다운로드 방지 (속도↑)
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.tf-plugin-cache"
  # ── DRY_RUN — 모든 apply 성격 job의 기본값(true=plan만, apply 안 함). ──
  # 실제 적용은 Run pipeline에서 DRY_RUN=false 로 override. (각 task가 이 값을 상속)
  DRY_RUN: "true"

# provider 캐시를 job 간 공유 (init 시간 대폭 단축)
cache:
  key: tf-providers-$TF_VERSION
  paths:
    - .tf-plugin-cache

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'   # MR: validate/plan
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'        # "Run Pipeline" 수동 트리거도 가능
    - when: never

default:
  # Runner #159 (mTVqFd9H)에서 Docker Hub outbound 차단됨 — ECR 이미지 사용.
  image: 467878288214.dkr.ecr.ap-northeast-2.amazonaws.com/azure-cli:terraform-v1.14.6
  tags:
    - docker          # runner #159 (mTVqFd9H) — docker executor

# 모듈별 job 정의
include:
  - local: ci/00-bootstrap.yml
  - local: ci/10-validate.yml
  - local: ci/20-vpc-sc.yml
  - local: ci/30-org-policies.yml
  - local: ci/40-observability.yml
  - local: ci/50-scc.yml
  - local: ci/90-verify.yml

# ------------------------------------------------------------
# 공통 템플릿 (hidden job) — GCS backend init.
# include된 파일의 job들이 `extends: .tf_template` 로 상속.
# (앵커가 아니라 hidden job이라 include 경계를 넘어 동작함)
# ------------------------------------------------------------
.tf_template:
  resource_group: tfstate   # 같은 state 동시 접근 lock 충돌(412) 방지 — 직렬화
  needs: []                 # stage 순서 무시, 개별 job 독립 수동 실행
  before_script:
    - mkdir -p "$TF_PLUGIN_CACHE_DIR"
    # SA 키 → access token 직접 발급 → provider의 느린 userinfo 회피.
    - export GOOGLE_OAUTH_ACCESS_TOKEN="$(bash ci/mint-gcp-token.sh)"
    - test -n "$GOOGLE_OAUTH_ACCESS_TOKEN" || (echo "token mint failed"; exit 1)
    - cd $TF_ROOT
    # tfvars 는 gitignore → example 값으로 항상 덮어씀 (source of truth).
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"

# target 지정 apply 공통 스크립트 (hidden job) — `script: !reference [.tf_apply, script]`.
# DRY_RUN=true(기본) → plan만. DRY_RUN=false → plan 후 apply.
.tf_apply:
  script:
    - |
      set -e
      echo "▸ TF_TARGET=$TF_TARGET  DRY_RUN=$DRY_RUN"
      terraform plan -input=false -refresh=false -target="$TF_TARGET" -out=tfplan.binary
      if [ "$DRY_RUN" = "false" ]; then
        echo "▸ DRY_RUN=false — apply 실행"
        terraform apply -input=false -auto-approve tfplan.binary
      else
        echo "▸ DRY_RUN=true(기본) — plan만 수행. 적용하려면 Run pipeline에서 DRY_RUN=false 로 실행."
      fi
