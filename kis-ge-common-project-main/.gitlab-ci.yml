stages:
  - bootstrap      # 1회성: state bucket 생성 + SA 검증
  - validate
  - plan
  - vpc-sc          # 01.access-context-manager/* — Access Policy
  - org-policies    # 02.org-policies/*           — storage / cmek / location / service / iam / domain
  - observability   # 03.observability/*          — aggregated-log-sink + org-audit-config
  - scc             # 04.scc/*                    — SCC tier 게이트 + notification config
  - verify          # 전체 plan no-op

variables:
  TF_VERSION: "1.14.6"
  TF_ROOT: iac
  TF_STATE_BUCKET: kis-gemini-common-prod-tfstate
  TF_STATE_PREFIX: lzone/org
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # checkpoint-api.hashicorp.com 호출 차단 — allowlist 외이고 기능적으로 불필요
  CHECKPOINT_DISABLE: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'        # GitLab UI 수동 실행
    - if: '$CI_PIPELINE_SOURCE == "schedule"'   # 스케줄
    - when: never

default:
  # Runner #159 (mTVqFd9H)에서 Docker Hub outbound 차단됨 — ECR 이미지 사용.
  # 참고 repo(kimchibee/terraform-iac)와 동일 이미지. terraform $TF_VERSION 포함.
  image: 467878288214.dkr.ecr.ap-northeast-2.amazonaws.com/azure-cli:terraform-v1.14.6
  tags:
    - docker          # runner #159 (mTVqFd9H) — docker executor

# ------------------------------------------------------------
# 공통 템플릿: GCS backend init
# image / tags 는 default 에서 상속.
# ------------------------------------------------------------
.tf_template: &tf_template
  before_script:
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
    - cd $TF_ROOT
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"

# target 지정 apply 공통 스크립트
.tf_apply_target: &tf_apply_target
  - terraform plan -input=false -target=$TF_TARGET -out=tfplan.binary
  - terraform apply -input=false -auto-approve tfplan.binary

# ============================================================
# Bootstrap 진단 (network 연결 점검)
# Google API 도달성 + DNS + TLS handshake 확인. 막혔으면 인프라팀에 요청.
# ============================================================
bootstrap:network-check:
  stage: bootstrap
  before_script:
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y --no-install-recommends curl ca-certificates dnsutils >/dev/null
      elif command -v apk >/dev/null 2>&1; then
        apk add --no-cache curl ca-certificates bind-tools >/dev/null
      fi
  script:
    - echo "=== 1. Proxy environment variables ==="
    - env | grep -i proxy || echo "  (none)"
    - echo ""
    - echo "=== 2. DNS resolution ==="
    - for h in oauth2.googleapis.com storage.googleapis.com cloudresourcemanager.googleapis.com; do
        echo "--- $h ---";
        getent hosts $h 2>&1 || nslookup $h 2>&1 || echo "FAIL";
      done
    - echo ""
    - echo "=== 3. TCP port 443 ==="
    - for h in oauth2.googleapis.com storage.googleapis.com; do
        echo -n "$h:443 ... ";
        timeout 5 bash -c "</dev/tcp/$h/443" && echo "OPEN" || echo "BLOCKED/TIMEOUT";
      done
    - echo ""
    - echo "=== 4. TLS handshake + HTTP GET / ==="
    - for h in oauth2.googleapis.com storage.googleapis.com; do
        echo "--- GET https://$h/ ---";
        curl -sS --max-time 15 -o /dev/null -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n" https://$h/ || echo "  FAILED";
      done
    - echo ""
    - echo "=== 5. POST oauth2.googleapis.com/token (terraform's actual auth call) ==="
    - echo "--- POST /token (dummy grant) ---"
    - 'curl -sS --max-time 15
        -X POST
        -H "Content-Type: application/x-www-form-urlencoded"
        -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=dummy"
        -o /tmp/oauth_resp
        -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n"
        https://oauth2.googleapis.com/token || echo "  FAILED (timeout/blocked)"'
    - echo "--- response body (first 300 chars) ---"
    - head -c 300 /tmp/oauth_resp 2>/dev/null || echo "  (no body)"
    - echo ""
    - echo ""
    - echo "=== 6. POST storage.googleapis.com (bucket existence test) ==="
    - echo "--- GET /storage/v1/b/test-nonexistent (unauthenticated) ---"
    - 'curl -sS --max-time 15
        -o /tmp/storage_resp
        -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n"
        https://storage.googleapis.com/storage/v1/b/test-nonexistent-bucket-12345 || echo "  FAILED"'
    - head -c 300 /tmp/storage_resp 2>/dev/null || echo "  (no body)"
    - echo ""
    - echo ""
    - echo "=== 7. Other endpoints terraform may hit ==="
    - for h in cloudresourcemanager.googleapis.com iam.googleapis.com serviceusage.googleapis.com accesscontextmanager.googleapis.com orgpolicy.googleapis.com logging.googleapis.com; do
        echo -n "GET https://$h/ ... ";
        curl -sS --max-time 10 -o /dev/null -w "HTTP %{http_code} t:%{time_total}s\n" https://$h/ || echo "FAILED";
      done
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Bootstrap (1회성, 수동)
# - State bucket (kis-gemini-common-prod-tfstate) 생성
# - SA 키 인증 + 프로젝트 접근 검증 (google_client_config / google_project
#   data source가 토큰 발급 시도 — 실패 시 plan 단계에서 즉시 에러 노출)
# 로컬 state 사용 → CI artifact 로 30일 보존. 재실행 시 terraform import 필요.
# ============================================================
bootstrap:state-bucket:
  stage: bootstrap
  variables:
    TF_LOG: INFO   # 진단용 — 어느 API 호출에서 멈추는지 노출
  before_script:
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
    # ── SA 키 sanity check (terraform 돌리기 전에 JSON 파싱 가능한지 확인) ──
    - |
      if ! command -v python3 >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then apt-get install -y --no-install-recommends python3 >/dev/null 2>&1; fi
        if command -v apk     >/dev/null 2>&1; then apk add --no-cache python3 >/dev/null 2>&1; fi
      fi
      echo "=== SA key sanity ==="
      echo "$GOOGLE_CREDENTIALS" | python3 -c '
      import json, sys
      try:
          d = json.load(sys.stdin)
      except Exception as e:
          print("  ❌ JSON parse FAILED:", e); sys.exit(1)
      print("  client_email :", d.get("client_email", "MISSING"))
      print("  project_id   :", d.get("project_id", "MISSING"))
      print("  type         :", d.get("type", "MISSING"))
      pk = d.get("private_key", "")
      print("  private_key  : len =", len(pk))
      print("  private_key  : starts with BEGIN =", pk.startswith("-----BEGIN"))
      print("  private_key  : has real newlines =", chr(10) in pk)
      print("  private_key  : has literal \\n    =", "\\n" in pk and chr(10) not in pk)
      ' || echo "  ❌ SA 키 JSON 파싱 실패 — Variable에 들어간 값 재확인 필요"
      echo "==================="
    - cd bootstrap
  script:
    - terraform init -input=false
    - terraform plan -input=false
    - terraform apply -input=false -auto-approve
    - terraform output
  artifacts:
    when: always
    paths:
      - bootstrap/terraform.tfstate
      - bootstrap/terraform.tfstate.backup
    expire_in: 30 days
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# MR 단계 (validate + plan)
# ============================================================

# fmt → init → validate → tflint → tfsec 를 단일 job에서 순차 실행.
validate:
  stage: validate
  before_script:
    # 패키지 매니저 자동 감지 (ECR 이미지는 Debian 또는 Alpine 가능).
    - |
      NEED=""
      for t in curl bash unzip; do
        command -v "$t" >/dev/null 2>&1 || NEED="$NEED $t"
      done
      if [ -n "$NEED" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache $NEED
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y --no-install-recommends $NEED ca-certificates
        elif command -v yum >/dev/null 2>&1; then
          yum install -y $NEED
        fi
      fi
    - curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
  script:
    - terraform fmt -check -recursive $TF_ROOT
    - cd $TF_ROOT
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"
    - terraform validate
    - tflint --init
    - tflint --recursive
    - cd "$CI_PROJECT_DIR"
    - tfsec $TF_ROOT --minimum-severity HIGH
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

plan:
  stage: plan
  <<: *tf_template
  script:
    - terraform plan -input=false -out=tfplan.binary
  artifacts:
    paths:
      - $TF_ROOT/tfplan.binary
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ============================================================
# Stage: vpc-sc (01.access-context-manager/*)
# ============================================================

# Access Context Manager Access Policy (조직당 1개).
apply-access-policy:
  stage: vpc-sc
  <<: *tf_template
  variables:
    TF_TARGET: module.access_policy
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# 통합 Service Perimeter — 모든 자회사 프로젝트 포함.
# 자회사 추가 시 subsidiary_project_ids 갱신 후 재 apply.
apply-service-perimeter:
  stage: vpc-sc
  <<: *tf_template
  needs:
    - job: apply-access-policy
      optional: true
  variables:
    TF_TARGET: module.service_perimeter
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ============================================================
# Stage: org-policies (02.org-policies/*)
# ============================================================

# storage.publicAccessPrevention + storage.uniformBucketLevelAccess.
apply-storage-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-service-perimeter
      optional: true
  variables:
    TF_TARGET: module.storage_policies
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# gcp.restrictNonCmekServices (기본 비활성 toggle).
apply-cmek-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-storage-policies
      optional: true
  variables:
    TF_TARGET: module.cmek_policies
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# gcp.resourceLocations (한국 데이터 주권).
apply-location-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-cmek-policies
      optional: true
  variables:
    TF_TARGET: module.location_policies
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# gcp.restrictServiceUsage (허용 API 화이트리스트).
apply-service-restriction-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-location-policies
      optional: true
  variables:
    TF_TARGET: module.service_restriction_policies
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# iam.disable* (SA key / cross-project / auto-grants).
apply-iam-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-service-restriction-policies
      optional: true
  variables:
    TF_TARGET: module.iam_policies
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# iam.allowedPolicyMemberDomains — ⚠️ PLAN-ONLY (mz.co.kr lock 위험).
plan-domain-policies:
  stage: org-policies
  <<: *tf_template
  needs:
    - job: apply-iam-policies
      optional: true
  script:
    - terraform plan -input=false -target=module.domain_policies
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ============================================================
# Stage: observability (03.observability/*)
# ============================================================

# Organization log sink + 중앙 audit GCS bucket.
apply-aggregated-sink:
  stage: observability
  <<: *tf_template
  needs:
    - job: plan-domain-policies
      optional: true
  variables:
    TF_TARGET: module.aggregated_log_sink
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# google_organization_iam_audit_config (DATA_READ/WRITE 강제, 비용 영향).
apply-org-audit-config:
  stage: observability
  <<: *tf_template
  needs:
    - job: apply-aggregated-sink
      optional: true
  variables:
    TF_TARGET: module.org_audit_config
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# DLP Discovery (조직 레벨). SCC Premium tier 사전 활성화 필수.
# enable_dlp_discovery=false 기본 → 자원 0개.
apply-dlp-discovery:
  stage: observability
  <<: *tf_template
  needs:
    - job: apply-org-audit-config
      optional: true
  variables:
    TF_TARGET: module.dlp_discovery
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ============================================================
# Stage: scc (04.scc/*)
# ============================================================

# SCC Premium/Enterprise tier 활성화 확인 게이트 (수동).
enable-scc-tier:
  stage: scc
  image: alpine:3
  needs:
    - job: apply-org-audit-config
      optional: true
  script:
    - |
      cat <<'MSG'
      ==> SCC Premium/Enterprise tier 활성화 확인 단계

      수동 작업:
        1. GCP Console - Security - Security Command Center - Settings
        2. Tier - Activate Premium 또는 Activate Enterprise 클릭
        3. Billing account 연결 및 비용 승인
        4. (선택) ETD / Attack Path / Mandiant 설정 확인

      활성화 완료 후 terraform.tfvars 에서 enable_phase6 = true 로 변경 후
      main 에 push, 이 job 통과시키면 apply-scc-notifications 진행 가능.

      필요 권한: roles/securitycenter.admin (org) + roles/billing.user
      MSG
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# SCC notification config + PubSub topic (Premium tier 전제).
apply-scc-notifications:
  stage: scc
  <<: *tf_template
  needs:
    - job: enable-scc-tier
      optional: true
  variables:
    TF_TARGET: module.scc_notifications
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ============================================================
# Stage: verify — 전체 plan no-op
# ============================================================
apply-verify:
  stage: verify
  <<: *tf_template
  needs:
    - job: apply-scc-notifications
      optional: true
  script:
    - terraform plan -input=false
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
