stages:
  - bootstrap      # 1회성: state bucket 생성 + SA 검증
  - validate
  - plan
  - vpc-sc          # 01.access-context-manager/* — Access Policy
  - org-policies    # 02.org-policies/*           — storage / cmek / location / service / iam / domain
  - observability   # 03.observability/*          — aggregated-log-sink + org-audit-config
  - scc             # 04.scc/*                    — SCC tier 게이트 + notification config
  - verify          # 전체 plan no-op

variables:
  TF_VERSION: "1.14.6"
  TF_ROOT: iac
  TF_STATE_BUCKET: kis-gemini-common-prod-tfstate
  TF_STATE_PREFIX: lzone/org
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # checkpoint-api.hashicorp.com 호출 차단 — allowlist 외이고 기능적으로 불필요
  CHECKPOINT_DISABLE: "1"
  # provider plugin 캐시 — job마다 google provider(~150MB) 재다운로드 방지 (속도↑)
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.tf-plugin-cache"

# provider 캐시를 job 간 공유 (init 시간 대폭 단축)
cache:
  key: tf-providers-$TF_VERSION
  paths:
    - .tf-plugin-cache

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'   # MR: validate/plan
    # main push → apply 체인 자동 cascade 시작 (apply-services부터 순차 실행).
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'        # "Run Pipeline" 수동 트리거도 가능
    - when: never

default:
  # Runner #159 (mTVqFd9H)에서 Docker Hub outbound 차단됨 — ECR 이미지 사용.
  # 참고 repo(kimchibee/terraform-iac)와 동일 이미지. terraform $TF_VERSION 포함.
  image: 467878288214.dkr.ecr.ap-northeast-2.amazonaws.com/azure-cli:terraform-v1.14.6
  tags:
    - docker          # runner #159 (mTVqFd9H) — docker executor

# ------------------------------------------------------------
# 공통 템플릿: GCS backend init
# image / tags 는 default 에서 상속.
# needs: [] → stage 순서 무시, 모든 apply job을 아무 때나 독립 클릭 가능.
# (단, 같은 state라 동시 실행은 금지 — 하나씩 수동 실행)
# ------------------------------------------------------------
.tf_template: &tf_template
  # 동일 GCS state를 동시 접근하면 lock 충돌(412) → resource_group으로 직렬화.
  # 같은 그룹의 job은 파이프라인 전체에서 한 번에 하나만 실행됨 (state-lock 방지).
  resource_group: tfstate
  # needs: [] → stage 순서 무시, 모든 apply job을 아무 때나 독립 클릭 가능.
  # 변경된 모듈의 job만 골라 수동 실행 (전체 cascade 불필요).
  needs: []
  before_script:
    - mkdir -p "$TF_PLUGIN_CACHE_DIR"
    # SA 키 → access token 직접 발급 → provider의 느린 userinfo(www.googleapis.com) 회피.
    # oauth2.googleapis.com/token(allowlist, 빠름)만 호출.
    - export GOOGLE_OAUTH_ACCESS_TOKEN="$(bash ci/mint-gcp-token.sh)"
    - test -n "$GOOGLE_OAUTH_ACCESS_TOKEN" || (echo "token mint failed"; exit 1)
    - cd $TF_ROOT
    # terraform.tfvars 가 gitignore라 CI엔 없음 → example 값으로 fallback.
    # 로컬에서 만든 tfvars가 커밋되어 있으면 그게 우선 사용됨.
    # example 값으로 항상 덮어씀 (stale/불완전 tfvars 방지). 값은 example이 source of truth.
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"

# target 지정 apply 공통 스크립트
.tf_apply_target: &tf_apply_target
  # -refresh=false: 이미 적용된 자원 재조회 생략 → plan 속도↑ (proxy 지연 회피)
  - terraform plan -input=false -refresh=false -target=$TF_TARGET -out=tfplan.binary
  - terraform apply -input=false -auto-approve tfplan.binary

# ============================================================
# State lock 강제 해제 (stale lock 정리용, 수동)
# ⚠️ 다른 apply가 실제 실행 중이 아닐 때만 사용. hang/취소된 run이 남긴
# default.tflock 을 삭제. 잘못 쓰면 state 손상 위험 → 꼭 단독 실행 확인 후.
# ============================================================
unlock-state:
  stage: bootstrap
  script:
    - |
      set -e
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
      LOCK="gs://${TF_STATE_BUCKET}/${TF_STATE_PREFIX}/default.tflock"
      echo "=== stale lock 삭제 시도: $LOCK ==="
      if gcloud storage rm "$LOCK"; then
        echo "  ✅ lock 삭제됨 — 이제 plan/apply 재실행 가능"
      else
        echo "  (lock 파일 없음 — 이미 해제됨)"
      fi
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Bootstrap (1회성, 수동)
# - State bucket (kis-gemini-common-prod-tfstate) 생성
# - SA 키 인증 + 프로젝트 접근 검증 (google_client_config / google_project
#   data source가 토큰 발급 시도 — 실패 시 plan 단계에서 즉시 에러 노출)
# 로컬 state 사용 → CI artifact 로 30일 보존. 재실행 시 terraform import 필요.
# ============================================================
bootstrap:state-bucket:
  stage: bootstrap
  variables:
    TF_LOG: INFO   # 진단용 — 어느 API 호출에서 멈추는지 노출
  before_script:
    # ── Variable visibility check — Group/Project/Protected/Environment 진단 ──
    - |
      echo "=== Variable visibility ==="
      echo "  CI_PROJECT_PATH      : $CI_PROJECT_PATH"
      echo "  CI_COMMIT_REF_NAME   : $CI_COMMIT_REF_NAME"
      echo "  CI_COMMIT_REF_PROTECTED : $CI_COMMIT_REF_PROTECTED"
      echo "  CI_ENVIRONMENT_NAME  : ${CI_ENVIRONMENT_NAME:-<none>}"
      echo "  variable length      : ${#kis_gemini_common_prod_iac_key}"
      echo "  similar env vars (masked):"
      env | grep -i "kis_gemini\|iac_key" | sed 's/=.*$/=<masked>/' | sed 's/^/    /' || echo "    (none)"
      echo "==========================="
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
    # ── SA 키 sanity check (terraform 돌리기 전에 JSON 파싱 가능한지 확인) ──
    - |
      if ! command -v python3 >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then apt-get install -y --no-install-recommends python3 >/dev/null 2>&1; fi
        if command -v apk     >/dev/null 2>&1; then apk add --no-cache python3 >/dev/null 2>&1; fi
      fi
      echo "=== SA key sanity ==="
      echo "$GOOGLE_CREDENTIALS" | python3 -c '
      import json, sys
      try:
          d = json.load(sys.stdin)
      except Exception as e:
          print("  ❌ JSON parse FAILED:", e); sys.exit(1)
      print("  client_email :", d.get("client_email", "MISSING"))
      print("  project_id   :", d.get("project_id", "MISSING"))
      print("  type         :", d.get("type", "MISSING"))
      pk = d.get("private_key", "")
      print("  private_key  : len =", len(pk))
      print("  private_key  : starts with BEGIN =", pk.startswith("-----BEGIN"))
      print("  private_key  : has real newlines =", chr(10) in pk)
      print("  private_key  : has literal \\n    =", "\\n" in pk and chr(10) not in pk)
      ' || echo "  ❌ SA 키 JSON 파싱 실패 — Variable에 들어간 값 재확인 필요"
      echo "==================="
    # ── access token 직접 발급 → provider의 느린 userinfo(www.googleapis.com) 호출 회피 ──
    # oauth2.googleapis.com/token(allowlist, 빠름)만 호출. 토큰을 GOOGLE_OAUTH_ACCESS_TOKEN
    # 으로 주면 provider가 자격증명 검증/userinfo 단계를 건너뜀.
    - export GOOGLE_OAUTH_ACCESS_TOKEN="$(bash ci/mint-gcp-token.sh)"
    - test -n "$GOOGLE_OAUTH_ACCESS_TOKEN" || (echo "token mint failed"; exit 1)
    - cd bootstrap
  script:
    - terraform init -input=false
    - terraform plan -input=false
    - terraform apply -input=false -auto-approve
    - terraform output
  artifacts:
    when: always
    paths:
      - bootstrap/terraform.tfstate
      - bootstrap/terraform.tfstate.backup
    expire_in: 30 days
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# MR 단계 (validate + plan)
# ============================================================

# fmt → init → validate → tflint → tfsec 를 단일 job에서 순차 실행.
validate:
  stage: validate
  before_script:
    # 패키지 매니저 자동 감지 (ECR 이미지는 Debian 또는 Alpine 가능).
    - |
      NEED=""
      for t in curl bash unzip; do
        command -v "$t" >/dev/null 2>&1 || NEED="$NEED $t"
      done
      if [ -n "$NEED" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache $NEED
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y --no-install-recommends $NEED ca-certificates
        elif command -v yum >/dev/null 2>&1; then
          yum install -y $NEED
        fi
      fi
    - curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
  script:
    - terraform fmt -check -recursive $TF_ROOT
    - cd $TF_ROOT
    # example 값으로 항상 덮어씀 (stale/불완전 tfvars 방지). 값은 example이 source of truth.
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"
    - terraform validate
    - tflint --init
    - tflint --recursive
    - cd "$CI_PROJECT_DIR"
    - tfsec $TF_ROOT --minimum-severity HIGH
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

plan:
  stage: plan
  <<: *tf_template
  script:
    - terraform plan -input=false -out=tfplan.binary
  artifacts:
    paths:
      - $TF_ROOT/tfplan.binary
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ============================================================
# 전체 순차 배포 (1클릭) — 모든 모듈을 정해진 순서로 한 job에서 apply.
# init/토큰 발급 1회만 → 개별 job 15개 cascade보다 훨씬 빠름.
# 신규/전체 배포는 이 job 하나, 변경분만 반영은 아래 개별 apply-* job.
# domain_policies는 plan-only(mz.co.kr lock 위험)라 의도적으로 제외.
# ============================================================
deploy-all:
  stage: vpc-sc
  <<: *tf_template
  script:
    - terraform apply -input=false -refresh=false -auto-approve -target=google_project_service.required
    - terraform apply -input=false -refresh=false -auto-approve -target=module.access_policy
    - terraform apply -input=false -refresh=false -auto-approve -target=module.service_perimeter
    - terraform apply -input=false -refresh=false -auto-approve -target=module.storage_policies
    - terraform apply -input=false -refresh=false -auto-approve -target=module.cmek_policies
    - terraform apply -input=false -refresh=false -auto-approve -target=module.location_policies
    - terraform apply -input=false -refresh=false -auto-approve -target=module.service_restriction_policies
    - terraform apply -input=false -refresh=false -auto-approve -target=module.iam_policies
    - terraform apply -input=false -refresh=false -auto-approve -target=module.aggregated_log_sink
    - terraform apply -input=false -refresh=false -auto-approve -target=module.org_audit_config
    - terraform apply -input=false -refresh=false -auto-approve -target=module.dlp_discovery
    - terraform apply -input=false -refresh=false -auto-approve -target=module.scc_notifications
    - terraform apply -input=false -refresh=false -auto-approve -target=module.scc_onprem_forwarder
    - terraform plan -input=false   # 최종 확인 (domain_policies 제외 상태에서 no-op이어야 함)
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# 필수 GCP API 활성화 (1회). 다른 apply job 전에 먼저 실행.
# depends_on 제거로 각 apply job이 10개 서비스를 매번 처리하지 않음 → 속도↑.
apply-services:
  stage: vpc-sc
  <<: *tf_template
  variables:
    TF_TARGET: google_project_service.required
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# Access Context Manager Access Policy (조직당 1개).
apply-access-policy:
  stage: vpc-sc
  <<: *tf_template
  variables:
    TF_TARGET: module.access_policy
  script: *tf_apply_target
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# 통합 Service Perimeter — 모든 자회사 프로젝트 포함.
# 자회사 추가 시 subsidiary_project_ids 갱신 후 재 apply.
apply-service-perimeter:
  stage: vpc-sc
  <<: *tf_template
  variables:
    TF_TARGET: module.service_perimeter
    # REFRESH=true(기본) → -refresh 생략(terraform 기본 refresh)로 state-GCP drift 감지.
    # 빠른 no-refresh가 필요하면 REFRESH=false.
    REFRESH: "true"
    # PERIMETER_ONLY=true → perimeter 리소스만 target(access level 추가/삭제 제외).
    # access level 참조 제거를 먼저 반영해야 할 때 사용(VPC-SC 순서 문제 회피):
    #   ① PERIMETER_ONLY=true 로 perimeter 먼저 갱신(참조 제거)
    #   ② 일반 실행(PERIMETER_ONLY=false)으로 잔여 access level 정리(삭제)
    PERIMETER_ONLY: "false"
    # DRY_RUN — tfvars의 perimeter_dry_run을 -var로 override.
    #   "true"  → spec(use_explicit_dry_run_spec) = 위반을 로그만 남기고 차단 안 함(검증용).
    #   "false" → status(enforce) = 실제 차단. "default" → tfvars 값(perimeter_dry_run) 그대로.
    # ingress/restricted_services 변경은 DRY_RUN=true로 먼저 검증 후 false로 enforce 권장.
    DRY_RUN: "default"
  script:
    - |
      TGT="$TF_TARGET"
      if [ "$PERIMETER_ONLY" = "true" ]; then
        TGT='module.service_perimeter.google_access_context_manager_service_perimeter.central[0]'
        echo "▸ PERIMETER_ONLY=true — perimeter 리소스만 적용: $TGT"
      fi
      RF=""
      [ "$REFRESH" != "true" ] && RF="-refresh=false"
      DRV=""
      if [ "$DRY_RUN" = "true" ] || [ "$DRY_RUN" = "false" ]; then
        DRV="-var=perimeter_dry_run=$DRY_RUN"
        echo "▸ DRY_RUN=$DRY_RUN (override perimeter_dry_run)"
      else
        echo "▸ DRY_RUN=default — tfvars의 perimeter_dry_run 사용"
      fi
      echo "▸ plan: target=$TGT  REFRESH=$REFRESH"
      terraform plan -input=false $RF $DRV -target="$TGT" -out=tfplan.binary
      terraform apply -input=false -auto-approve tfplan.binary
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

