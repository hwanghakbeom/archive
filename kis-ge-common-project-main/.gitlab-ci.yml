stages:
  - bootstrap      # 1회성: state bucket 생성 + SA 검증
  - validate
  - plan
  - vpc-sc          # 01.access-context-manager/* — Access Policy
  - org-policies    # 02.org-policies/*           — storage / cmek / location / service / iam / domain
  - observability   # 03.observability/*          — aggregated-log-sink + org-audit-config
  - scc             # 04.scc/*                    — SCC tier 게이트 + notification config
  - verify          # 전체 plan no-op

variables:
  TF_VERSION: "1.14.6"
  TF_ROOT: iac
  TF_STATE_BUCKET: kis-gemini-common-prod-tfstate
  TF_STATE_PREFIX: lzone/org
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # checkpoint-api.hashicorp.com 호출 차단 — allowlist 외이고 기능적으로 불필요
  CHECKPOINT_DISABLE: "1"
  # provider plugin 캐시 — job마다 google provider(~150MB) 재다운로드 방지 (속도↑)
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.tf-plugin-cache"

# provider 캐시를 job 간 공유 (init 시간 대폭 단축)
cache:
  key: tf-providers-$TF_VERSION
  paths:
    - .tf-plugin-cache

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'        # GitLab UI 수동 실행
    - if: '$CI_PIPELINE_SOURCE == "schedule"'   # 스케줄
    - when: never

default:
  # Runner #159 (mTVqFd9H)에서 Docker Hub outbound 차단됨 — ECR 이미지 사용.
  # 참고 repo(kimchibee/terraform-iac)와 동일 이미지. terraform $TF_VERSION 포함.
  image: 467878288214.dkr.ecr.ap-northeast-2.amazonaws.com/azure-cli:terraform-v1.14.6
  tags:
    - docker          # runner #159 (mTVqFd9H) — docker executor

# ------------------------------------------------------------
# 공통 템플릿: GCS backend init
# image / tags 는 default 에서 상속.
# needs: [] → stage 순서 무시, 모든 apply job을 아무 때나 독립 클릭 가능.
# (단, 같은 state라 동시 실행은 금지 — 하나씩 수동 실행)
# ------------------------------------------------------------
.tf_template: &tf_template
  needs: []
  before_script:
    - mkdir -p "$TF_PLUGIN_CACHE_DIR"
    # SA 키 → access token 직접 발급 → provider의 느린 userinfo(www.googleapis.com) 회피.
    # oauth2.googleapis.com/token(allowlist, 빠름)만 호출.
    - export GOOGLE_OAUTH_ACCESS_TOKEN="$(bash ci/mint-gcp-token.sh)"
    - test -n "$GOOGLE_OAUTH_ACCESS_TOKEN" || (echo "token mint failed"; exit 1)
    - cd $TF_ROOT
    # terraform.tfvars 가 gitignore라 CI엔 없음 → example 값으로 fallback.
    # 로컬에서 만든 tfvars가 커밋되어 있으면 그게 우선 사용됨.
    # example 값으로 항상 덮어씀 (stale/불완전 tfvars 방지). 값은 example이 source of truth.
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"

# target 지정 apply 공통 스크립트
.tf_apply_target: &tf_apply_target
  # -refresh=false: 이미 적용된 자원 재조회 생략 → plan 속도↑ (proxy 지연 회피)
  - terraform plan -input=false -refresh=false -target=$TF_TARGET -out=tfplan.binary
  - terraform apply -input=false -auto-approve tfplan.binary

# ============================================================
# 현재 진행 상황 확인 (read-only, 가벼움)
# terraform state list = state에 기록된(=이미 적용된) 자원 목록만 출력.
# refresh/plan 안 하므로 GCP API 자원별 호출 없음 → 빠름.
# 목록에 있으면 "완료", 없으면 "안 함".
# ============================================================
show-state:
  stage: vpc-sc
  <<: *tf_template
  script:
    - echo "=== state에 기록된 자원 (= 이미 적용 완료) ==="
    - terraform state list || echo "  (state 비어있음 — 아직 아무것도 apply 안 함)"
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# VPC-SC perimeter 실체 확인 (read-only)
# org의 access policy + perimeter 목록/설정을 SA로 조회.
# 어떤 perimeter가 어떤 프로젝트를 보호하는지, enforce/dry-run인지 확인.
# ============================================================
perimeter-inspect:
  stage: vpc-sc
  needs: []
  before_script:
    - |
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
  script:
    - export PATH="/tmp/google-cloud-sdk/bin:$PATH"
    - |
      echo "=== Access Policy 목록 ==="
      gcloud access-context-manager policies list --organization=457872813001 \
        --format="table(name,title)" || echo "  (조회 실패)"
      POLICY=$(gcloud access-context-manager policies list --organization=457872813001 --format="value(name)" | head -1)
      echo "  POLICY=$POLICY"
      if [ -z "$POLICY" ]; then echo "  Access Policy 없음 → perimeter도 없음"; exit 0; fi

      echo ""
      echo "=== Perimeter 목록 ==="
      gcloud access-context-manager perimeters list --policy="$POLICY" \
        --format="table(name,title,perimeterType)" || echo "  (perimeter 없음)"

      echo ""
      echo "=== Perimeter 상세 (보호 프로젝트 / enforce 여부) ==="
      for P in $(gcloud access-context-manager perimeters list --policy="$POLICY" --format="value(name)"); do
        echo "--- $P ---"
        gcloud access-context-manager perimeters describe "$P" --policy="$POLICY"
        echo ""
      done
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# ⚠️⚠️ VPC-SC perimeter 비활성화 (DESTRUCTIVE, 수동)
# perimeter를 삭제해 enforcement 제거 → 외부 runner가 보호 프로젝트 접근 가능.
# 삭제 전 describe로 전체 config를 로그에 기록 (복구용).
# 조직 보안 통제 제거이므로 perimeter-inspect로 확인 후, 신중히 실행.
# 안전장치: CONFIRM_DISABLE=yes 변수를 줘야 실제 삭제됨.
# ============================================================
perimeter-disable:
  stage: vpc-sc
  needs: []
  before_script:
    - |
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
  script:
    - export PATH="/tmp/google-cloud-sdk/bin:$PATH"
    - |
      POLICY=$(gcloud access-context-manager policies list --organization=457872813001 --format="value(name)" | head -1)
      if [ -z "$POLICY" ]; then echo "Access Policy 없음 → perimeter 없음, 할 일 없음"; exit 0; fi
      PERIMETERS=$(gcloud access-context-manager perimeters list --policy="$POLICY" --format="value(name)")
      if [ -z "$PERIMETERS" ]; then echo "perimeter 없음 → 할 일 없음"; exit 0; fi

      echo "=== 삭제 전 config 백업 기록 (복구용) ==="
      for P in $PERIMETERS; do
        echo "--- $P ---"
        gcloud access-context-manager perimeters describe "$P" --policy="$POLICY"
        echo ""
      done

      if [ "${CONFIRM_DISABLE:-}" != "yes" ]; then
        echo "⚠️ CONFIRM_DISABLE=yes 가 아니라서 삭제 안 함 (dry-run)."
        echo "   실제로 disable하려면 job 실행 시 변수 CONFIRM_DISABLE=yes 추가."
        exit 0
      fi

      echo "=== perimeter 삭제 (disable) ==="
      for P in $PERIMETERS; do
        echo "deleting $P ..."
        gcloud access-context-manager perimeters delete "$P" --policy="$POLICY" --quiet \
          && echo "  ✅ 삭제됨" || echo "  ❌ 삭제 실패"
      done
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# State lock 강제 해제 (stale lock 정리용, 수동)
# ⚠️ 다른 apply가 실제 실행 중이 아닐 때만 사용. hang/취소된 run이 남긴
# default.tflock 을 삭제. 잘못 쓰면 state 손상 위험 → 꼭 단독 실행 확인 후.
# ============================================================
unlock-state:
  stage: bootstrap
  script:
    - |
      set -e
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json; else printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json; fi
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud auth activate-service-account --key-file=/tmp/sa.json
      LOCK="gs://${TF_STATE_BUCKET}/${TF_STATE_PREFIX}/default.tflock"
      echo "=== stale lock 삭제 시도: $LOCK ==="
      if gcloud storage rm "$LOCK"; then
        echo "  ✅ lock 삭제됨 — 이제 plan/apply 재실행 가능"
      else
        echo "  (lock 파일 없음 — 이미 해제됨)"
      fi
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Bootstrap 진단 (network 연결 점검)
# Google API 도달성 + DNS + TLS handshake 확인. 막혔으면 인프라팀에 요청.
# ============================================================
bootstrap:network-check:
  stage: bootstrap
  before_script:
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y --no-install-recommends curl ca-certificates dnsutils >/dev/null
      elif command -v apk >/dev/null 2>&1; then
        apk add --no-cache curl ca-certificates bind-tools >/dev/null
      fi
  script:
    - echo "=== 1. Proxy environment variables ==="
    - env | grep -i proxy || echo "  (none)"
    - echo ""
    - echo "=== 2. DNS resolution ==="
    - for h in oauth2.googleapis.com storage.googleapis.com cloudresourcemanager.googleapis.com; do
        echo "--- $h ---";
        getent hosts $h 2>&1 || nslookup $h 2>&1 || echo "FAIL";
      done
    - echo ""
    - echo "=== 3. TCP port 443 ==="
    - for h in oauth2.googleapis.com storage.googleapis.com; do
        echo -n "$h:443 ... ";
        timeout 5 bash -c "</dev/tcp/$h/443" && echo "OPEN" || echo "BLOCKED/TIMEOUT";
      done
    - echo ""
    - echo "=== 4. TLS handshake + HTTP GET / ==="
    - for h in oauth2.googleapis.com storage.googleapis.com; do
        echo "--- GET https://$h/ ---";
        curl -sS --max-time 15 -o /dev/null -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n" https://$h/ || echo "  FAILED";
      done
    - echo ""
    - echo "=== 5. POST oauth2.googleapis.com/token (terraform's actual auth call) ==="
    - echo "--- POST /token (dummy grant) ---"
    - 'curl -sS --max-time 15
        -X POST
        -H "Content-Type: application/x-www-form-urlencoded"
        -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=dummy"
        -o /tmp/oauth_resp
        -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n"
        https://oauth2.googleapis.com/token || echo "  FAILED (timeout/blocked)"'
    - echo "--- response body (first 300 chars) ---"
    - head -c 300 /tmp/oauth_resp 2>/dev/null || echo "  (no body)"
    - echo ""
    - echo ""
    - echo "=== 6. POST storage.googleapis.com (bucket existence test) ==="
    - echo "--- GET /storage/v1/b/test-nonexistent (unauthenticated) ---"
    - 'curl -sS --max-time 15
        -o /tmp/storage_resp
        -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n"
        https://storage.googleapis.com/storage/v1/b/test-nonexistent-bucket-12345 || echo "  FAILED"'
    - head -c 300 /tmp/storage_resp 2>/dev/null || echo "  (no body)"
    - echo ""
    - echo ""
    - echo "=== 7. Other endpoints terraform may hit ==="
    - for h in cloudresourcemanager.googleapis.com iam.googleapis.com serviceusage.googleapis.com accesscontextmanager.googleapis.com orgpolicy.googleapis.com logging.googleapis.com; do
        echo -n "GET https://$h/ ... ";
        curl -sS --max-time 10 -o /dev/null -w "HTTP %{http_code} t:%{time_total}s\n" https://$h/ || echo "FAILED";
      done
    - echo ""
    - echo "=== 8. www.googleapis.com — userinfo / oauth2 helper (provider validates here) ==="
    - echo "--- GET https://www.googleapis.com/ ---"
    - 'curl -sS --max-time 15 -o /dev/null -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n" https://www.googleapis.com/ || echo "  FAILED"'
    - echo "--- GET https://www.googleapis.com/oauth2/v3/userinfo (no auth) ---"
    - 'curl -sS --max-time 15 -o /tmp/userinfo_resp -w "  HTTP %{http_code}  TLS:%{time_connect}s  total:%{time_total}s\n" https://www.googleapis.com/oauth2/v3/userinfo || echo "  FAILED"'
    - head -c 300 /tmp/userinfo_resp 2>/dev/null || echo "  (no body)"
    - echo ""
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# Bootstrap (1회성, 수동)
# - State bucket (kis-gemini-common-prod-tfstate) 생성
# - SA 키 인증 + 프로젝트 접근 검증 (google_client_config / google_project
#   data source가 토큰 발급 시도 — 실패 시 plan 단계에서 즉시 에러 노출)
# 로컬 state 사용 → CI artifact 로 30일 보존. 재실행 시 terraform import 필요.
# ============================================================
bootstrap:state-bucket:
  stage: bootstrap
  variables:
    TF_LOG: INFO   # 진단용 — 어느 API 호출에서 멈추는지 노출
  before_script:
    # ── Variable visibility check — Group/Project/Protected/Environment 진단 ──
    - |
      echo "=== Variable visibility ==="
      echo "  CI_PROJECT_PATH      : $CI_PROJECT_PATH"
      echo "  CI_COMMIT_REF_NAME   : $CI_COMMIT_REF_NAME"
      echo "  CI_COMMIT_REF_PROTECTED : $CI_COMMIT_REF_PROTECTED"
      echo "  CI_ENVIRONMENT_NAME  : ${CI_ENVIRONMENT_NAME:-<none>}"
      echo "  variable length      : ${#kis_gemini_common_prod_iac_key}"
      echo "  similar env vars (masked):"
      env | grep -i "kis_gemini\|iac_key" | sed 's/=.*$/=<masked>/' | sed 's/^/    /' || echo "    (none)"
      echo "==========================="
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
    # ── SA 키 sanity check (terraform 돌리기 전에 JSON 파싱 가능한지 확인) ──
    - |
      if ! command -v python3 >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then apt-get install -y --no-install-recommends python3 >/dev/null 2>&1; fi
        if command -v apk     >/dev/null 2>&1; then apk add --no-cache python3 >/dev/null 2>&1; fi
      fi
      echo "=== SA key sanity ==="
      echo "$GOOGLE_CREDENTIALS" | python3 -c '
      import json, sys
      try:
          d = json.load(sys.stdin)
      except Exception as e:
          print("  ❌ JSON parse FAILED:", e); sys.exit(1)
      print("  client_email :", d.get("client_email", "MISSING"))
      print("  project_id   :", d.get("project_id", "MISSING"))
      print("  type         :", d.get("type", "MISSING"))
      pk = d.get("private_key", "")
      print("  private_key  : len =", len(pk))
      print("  private_key  : starts with BEGIN =", pk.startswith("-----BEGIN"))
      print("  private_key  : has real newlines =", chr(10) in pk)
      print("  private_key  : has literal \\n    =", "\\n" in pk and chr(10) not in pk)
      ' || echo "  ❌ SA 키 JSON 파싱 실패 — Variable에 들어간 값 재확인 필요"
      echo "==================="
    # ── access token 직접 발급 → provider의 느린 userinfo(www.googleapis.com) 호출 회피 ──
    # oauth2.googleapis.com/token(allowlist, 빠름)만 호출. 토큰을 GOOGLE_OAUTH_ACCESS_TOKEN
    # 으로 주면 provider가 자격증명 검증/userinfo 단계를 건너뜀.
    - export GOOGLE_OAUTH_ACCESS_TOKEN="$(bash ci/mint-gcp-token.sh)"
    - test -n "$GOOGLE_OAUTH_ACCESS_TOKEN" || (echo "token mint failed"; exit 1)
    - cd bootstrap
  script:
    - terraform init -input=false
    - terraform plan -input=false
    - terraform apply -input=false -auto-approve
    - terraform output
  artifacts:
    when: always
    paths:
      - bootstrap/terraform.tfstate
      - bootstrap/terraform.tfstate.backup
    expire_in: 30 days
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================================
# MR 단계 (validate + plan)
# ============================================================

# fmt → init → validate → tflint → tfsec 를 단일 job에서 순차 실행.
validate:
  stage: validate
  before_script:
    # 패키지 매니저 자동 감지 (ECR 이미지는 Debian 또는 Alpine 가능).
    - |
      NEED=""
      for t in curl bash unzip; do
        command -v "$t" >/dev/null 2>&1 || NEED="$NEED $t"
      done
      if [ -n "$NEED" ]; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache $NEED
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y --no-install-recommends $NEED ca-certificates
        elif command -v yum >/dev/null 2>&1; then
          yum install -y $NEED
        fi
      fi
    - curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - curl -sSL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
    - export GOOGLE_CREDENTIALS="$kis_gemini_common_prod_iac_key"
  script:
    - terraform fmt -check -recursive $TF_ROOT
    - cd $TF_ROOT
    # example 값으로 항상 덮어씀 (stale/불완전 tfvars 방지). 값은 example이 source of truth.
    - cp -f terraform.tfvars.example terraform.tfvars
    - terraform init
        -backend-config="bucket=$TF_STATE_BUCKET"
        -backend-config="prefix=$TF_STATE_PREFIX"
    - terraform validate
    - tflint --init
    - tflint --recursive
    - cd "$CI_PROJECT_DIR"
    - tfsec $TF_ROOT --minimum-severity HIGH
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

plan:
  stage: plan
  <<: *tf_template
  script:
    - terraform plan -input=false -out=tfplan.binary
  artifacts:
    paths:
      - $TF_ROOT/tfplan.binary
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ============================================================
# Stage: vpc-sc (01.access-context-manager/*)
# ============================================================

# SA의 org 레벨 권한 검증 (read-only). apply 전에 권한 있는지 확인용.
# gcloud SDK를 storage.googleapis.com(allowlist에 있음)에서 받아 SA로 인증 후
# ACM policy list 시도 → 성공하면 권한 OK, 403이면 org 권한 미부여.
verify-sa-org-perms:
  stage: vpc-sc
  script:
    - |
      set -e
      echo "=== 0. 변수 타입 감지 + SA 키 추출 ==="
      echo "  raw length: ${#kis_gemini_common_prod_iac_key}"
      if [ -f "$kis_gemini_common_prod_iac_key" ]; then
        echo "  → File 타입 (path=$kis_gemini_common_prod_iac_key)"
        cp "$kis_gemini_common_prod_iac_key" /tmp/sa.json
      else
        echo "  → Variable 타입(content) 또는 빈 값"
        printf '%s' "$kis_gemini_common_prod_iac_key" > /tmp/sa.json
      fi
      echo "  /tmp/sa.json size: $(wc -c < /tmp/sa.json) bytes"
      if [ ! -s /tmp/sa.json ]; then
        echo "  ❌ SA 키가 비어있음 — 변수가 이 job에 주입 안 됨 (Protected/Environment scope 또는 변수명 오타)"
        exit 1
      fi

      echo ""
      echo "=== 1. SA email ==="
      SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/sa.json'))['client_email'])")
      echo "  $SA_EMAIL"

      echo ""
      echo "=== 2. gcloud SDK 다운로드 (storage.googleapis.com, allowlist) ==="
      ARCH=$(uname -m); case "$ARCH" in x86_64) A=x86_64;; aarch64|arm64) A=arm;; *) A=x86_64;; esac
      curl -sSL -o /tmp/gcloud.tar.gz \
        "https://storage.googleapis.com/cloud-sdk-release/google-cloud-cli-linux-${A}.tar.gz"
      tar -xzf /tmp/gcloud.tar.gz -C /tmp
      export PATH="/tmp/google-cloud-sdk/bin:$PATH"
      gcloud version | head -1

      echo ""
      echo "=== 3. SA 인증 ==="
      gcloud auth activate-service-account --key-file=/tmp/sa.json

      echo ""
      echo "=== 3-1. ⭐ SA가 속한 진짜 org ID 탐색 ==="
      SA_PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/sa.json'))['project_id'])")
      echo "  SA project_id: $SA_PROJECT"
      echo "  --- 이 프로젝트의 ancestry (최상단이 org) ---"
      gcloud projects get-ancestors "$SA_PROJECT" 2>&1 || echo "  (get-ancestors 실패)"
      echo "  --- SA가 볼 수 있는 organization 목록 ---"
      gcloud organizations list --format="table(displayName,ID)" 2>&1 || echo "  (organizations list 실패 — org viewer 권한 없을 수 있음)"
      echo "  ⮕ 위 org ID가 terraform org_id (현재 457872813001)와 다르면 그게 403 원인"

      echo ""
      echo "=== 4. org IAM에서 이 SA의 역할 조회 (현재 설정 org 457872813001) ==="
      gcloud organizations get-iam-policy 457872813001 \
        --flatten="bindings[].members" \
        --filter="bindings.members:serviceAccount:${SA_EMAIL}" \
        --format="table(bindings.role)" || echo "  (조회 실패 — 이 org에 권한 없거나 다른 org임)"

      echo ""
      echo "=== 5. ACM policy list 시도 (현재 설정 org 457872813001) ==="
      if gcloud access-context-manager policies list --organization=457872813001; then
        echo "  ✅ 457872813001에 accesscontextmanager 권한 OK"
      else
        echo "  ❌ 403 — 457872813001엔 권한 없음 (org ID가 틀렸거나 권한 미부여)"
      fi
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

