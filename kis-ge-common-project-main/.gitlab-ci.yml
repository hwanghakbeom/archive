# 루트(부모) 파이프라인 — 공통 설정은 ci/_templates.yml로 분리.
# 01~03 모듈은 이 파이프라인에서 직접, 04.scc는 child 파이프라인(trigger)으로 분리.
stages:
  - bootstrap
  - validate
  - plan
  - vpc-sc
  - org-policies
  - observability
  - scc            # 04.scc child 파이프라인 trigger
  - apply
  - verify

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

include:
  # 공통 템플릿 (variables/default/cache/.tf_*)
  - local: ci/_templates.yml
  # 스택 레벨 job
  - local: ci/00-bootstrap.yml
  - local: ci/10-validate.yml
  - local: ci/90-verify.yml
  # 01~03 모듈 (같은 파이프라인)
  - local: iac/01.access-context-manager/access-policy/.gitlab-ci.yml
  - local: iac/01.access-context-manager/service-perimeter/.gitlab-ci.yml
  - local: iac/01.access-context-manager/.gitlab-ci.yml
  - local: iac/02.org-policies/storage-policies/.gitlab-ci.yml
  - local: iac/02.org-policies/cmek-policies/.gitlab-ci.yml
  - local: iac/02.org-policies/location-policies/.gitlab-ci.yml
  - local: iac/02.org-policies/service-restriction-policies/.gitlab-ci.yml
  - local: iac/02.org-policies/iam-policies/.gitlab-ci.yml
  - local: iac/02.org-policies/domain-restriction-policies/.gitlab-ci.yml
  - local: iac/03.observability/aggregated-log-sink/.gitlab-ci.yml
  - local: iac/03.observability/org-audit-config/.gitlab-ci.yml
  - local: iac/03.observability/ge-log-analytics/.gitlab-ci.yml
  - local: iac/03.observability/dlp-discovery/.gitlab-ci.yml

# ============================================================
# 04.scc — child 파이프라인 trigger (Downstream "Child" 표시)
# ============================================================
# scc 모듈군(notification/onprem-forwarder/ma-runtime-findings/tier)을
# 별도 child 파이프라인으로 분리. 부모 그래프에 Downstream(Child)로 나타남.
trigger-scc:
  stage: scc
  trigger:
    include:
      - local: iac/04.scc/scc-child.yml
    strategy: depend     # child 완료까지 부모 대기 + 상태 전파
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
